name: CI

# Pre-merge gate: every PR and push must compile, pass the full test suite, and build the frontend.
# This is the foundational guard — broken code (compile errors, failing tests, build breakage) can
# never reach the deploy step. Complements the runtime data-health monitor + post-deploy smoke test.
on:
  push:
    branches: [main, "fix/**", "feat/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Java 21 · mvn test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build & test
        run: mvn -B -ntp test

  frontend:
    name: Frontend (Node 20 · vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Lint (advisory)
        run: npm run lint --if-present
        continue-on-error: true
      - name: Build
        run: npm run build
