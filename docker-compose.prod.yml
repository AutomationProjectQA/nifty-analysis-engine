version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nifty-postgres-prod
    environment:
      POSTGRES_DB: nifty
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: nifty-redis-prod
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nifty-backend-prod
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/nifty
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - TELEGRAM_ENABLED=true
    depends_on:
      - postgres
      - redis
    restart: always
