spring:
  application:
    name: nifty-analysis-engine
  
  # Scheduling Task Pool Configuration
  task:
    scheduling:
      pool:
        size: 5
      thread-name-prefix: scheduling-
  
  # Database Configuration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nifty}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      keepalive-time: 60000
  
  # JPA / Hibernate Configuration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Flyway Migration Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    ignore-migration-patterns:
      - "*:future"
      - "*:missing"

  # Redis Cache Configuration
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      timeout: 2000

# Logging Levels
logging:
  level:
    root: INFO
    com.nifty.analysis: INFO
    org.springframework.cache: DEBUG

# Nifty Analysis Engine Properties
nifty:
  gating-threshold: 60.0

  # ============================================================
  # SIGNAL GENERATION TUNING — more trades + higher accuracy,
  # WITHOUT changing the 2% profit target / 40% stop-loss.
  # ============================================================
  signal:
    # Evaluate an ITM and OTM strike around the ATM (not ATM-only).
    # ITM (higher delta) captures the 2% premium move more reliably.
    strike-ladder-enabled: true
    strike-step: 50
    # Instead of skipping SIDEWAYS markets entirely, allow them but demand
    # this much extra confidence (added to gating-threshold).
    sideways-extra-gate: 8.0
    # Require a liquid strike (LiquidityAgent score) before emitting a signal.
    min-liquidity-score: 70.0
    # Skip entries that strongly oppose the latest momentum tick.
    momentum-confirmation-enabled: true
    # Skip CE entries that are chasing an over-extended move above VWAP.
    entry-timing-enabled: true
    # P3-1: require INDEPENDENT confirmation before a signal — trend/structure AND order flow
    # (OI build-up or futures basis) AND a non-opposing PCR — not just a high blended score.
    min-confirmation-enabled: true
    confirm-score: 60.0        # a factor "confirms" when its direction-aware score >= this
    not-opposing-score: 50.0   # a factor is "not opposing" when its score >= this (>= neutral)
    # P3-3: decide direction by CONSENSUS of 4 independent signals (technical, multi-timeframe,
    # futures basis, OI bias), not one 1-minute technical tick.
    direction-consensus-enabled: true
    min-direction-agreement: 3 # of 4 votes must agree

  # Avoid the volatile first 15 min after open and the theta-heavy final 30 min.
  # Only carves out those intraday windows (does not affect 24/7 simulation runs).
  timing:
    session-filter-enabled: true

  # Expiry calendar (3 layers): live broker scrip master (authoritative) → holiday-aware weekday
  # → this config. The day is an escape hatch if SEBI/NSE changes the rule again (was Thursday,
  # now Tuesday for NSE NIFTY). Holidays only matter for the offline weekday fallback/backtests.
  expiry:
    day: TUESDAY
    holidays-resource: nse-holidays.txt

  # P5-2 multi-instrument. NIFTY always runs. Enable BANKNIFTY (lot 30, step 100, Tuesday) only when
  # you want it — keep it OFF for the live Nifty paper test so the portal/feed isn't mixed. Live Angel
  # One Bank Nifty fetch isn't wired yet, so enable this mainly with provider=simulated.
  instruments:
    banknifty-enabled: true

  # P4-1: calibrate confidence points into a measured P(win) and gate on break-even + margin.
  calibration:
    enabled: true
    min-samples: 30        # need this many resolved trades before the calibrated gate activates
    margin: 0.0            # extra win-rate cushion above break-even (0..1); raise to be stricter

  # Online learning: nudge confidence factor weights from resolved-trade outcomes.
  confidence:
    adaptive-enabled: true
    # Gentle online-learning rate (was 0.5 — lowered to reduce weight skew from noise).
    learning-rate: 0.25
    # P3-2: Trend, MultiTimeframe and VWAP are collinear (all measure trend). When true, they are
    # collapsed into ONE group so trend is counted once, not ~3x (which inflated every score).
    decollinearize-trend: true
    # P4-2: batched weight tuning. Per-trade online updates chase noise → OFF; the weekly batch
    # (AdaptiveWeightsService) tunes only over >= min-batch-trades with a held-out validation check.
    online-per-trade-enabled: false
    min-batch-trades: 30

  # Outbound HTTP timeouts (Angel One, Gemini, Yahoo) — a hung API can't block threads.
  http:
    connect-timeout-ms: 10000
    timeout-ms: 10000

  # Weight given to the ONNX model when blending its score with the rule-based
  # multi-agent confidence (0.0 = ignore model, 1.0 = model only).
  model-weight: 0.4
  # Minimum stored market snapshots before the ONNX model is trusted. Below this
  # the model runs on cold-start fallback features, so the agent score is used.
  model-min-history: 50

  regime:
    # Sideways-detection sensitivity (fraction of ATR). Lower = fewer markets
    # flagged sideways. Original hardcoded value was 0.25 (too aggressive).
    sideways-atr-factor: 0.10

  # ============================================================
  # RISK MANAGEMENT — tune these to control capital usage & daily limits.
  # Changing any value here takes effect on the next restart.
  # ============================================================
  risk:
    # Global kill switch. false = stop opening ANY new trades.
    # (Open trades are still managed/resolved as usual.)
    trading-enabled: true

    # Percent of available wallet capital allocated to EACH order.
    # e.g. 20.0 = use 20% of the wallet per trade. Was 100 (all-in per trade) — lowered to a
    # safer default; raise it back deliberately if you understand the risk.
    capital-per-order-percent: 100.0

    # Profit target as a percent of the entry premium (the "take 2% profit" goal).
    target-profit-percent: 2.0
    # Stop-loss as a percent of the entry premium.
    # IDEAL: keep the stop close to the target so one loss doesn't wipe many wins.
    #   - target 2% + stop ~2-3%   => R:R ~1:1, break-even win-rate ~55-60% (recommended)
    #   - target 2% + stop ~1.3%   => R:R ~1.5:1, break-even ~40% (aggressive but ideal R:R)
    #   - current 40% stop => R:R ~1:20, needs ~96% win-rate just to break even (NOT viable)
    # Change this value any time; no code change needed.
    stop-loss-percent: 20.0

    # Refuse to open new trades when the live broker feed has degraded to SIMULATED
    # data (prevents trading on fabricated prices). Only applies in provider=angelone
    # mode; pure simulated mode is unaffected. Kill-switch: set false to disable.
    block-on-simulated-data: true

    # Maximum number of NEW trades to open per trading day.
    max-trades-per-day: 50

    # Aggregate exposure cap: max simultaneously-open (ACTIVE) positions at any time
    # (across all strike-ladder legs). Prevents stacking many concurrent positions.
    max-concurrent-positions: 6

    # Halt new trades for the day once cumulative realised loss reaches this (NET P&L, INR).
    # Was 10,00,000 (so high it never tripped) — lowered to a sane default; tune to your capital.
    max-loss-per-day: 2500000.0

  # Live trade transaction-cost model (round-trip), subtracted from gross P&L so the
  # recorded P&L is NET. Defaults reflect typical Indian discount-broker option charges —
  # verify against your broker's contract note (rates change).
  costs:
    brokerage-per-order: 20.0       # flat ₹/order (×2 for round-trip)
    stt-percent-on-sell: 0.001      # 0.10% STT on sell premium
    exchange-txn-percent: 0.0003503 # ~0.03503% NSE txn on premium turnover
    sebi-percent: 0.000001          # 0.0001% SEBI fee
    stamp-percent-on-buy: 0.00003   # 0.003% stamp duty on buy premium
    gst-percent: 0.18               # 18% GST on (brokerage + txn + SEBI)

  # Backtest execution realism — model costs so reported P&L isn't optimistic.
  backtest:
    entry-premium: 150.0        # modeled ATM premium (historical premiums aren't stored)
    brokerage-per-trade: 40.0   # round-trip brokerage + fees per trade (INR)
    slippage-percent: 0.5       # slippage as % of premium, applied on entry and exit
    theta-decay-per-hour: 0.5   # premium points lost per hour held (time decay)

  order-execution:
    # PAPER MODE: false = signals are generated, tracked and resolved against the LIVE feed but
    # NO real Angel One order is placed. Flip to true only after reviewing paper results.
    enabled: true
    lot-size: 65

  # Real-time tick streaming via Angel One SmartWebSocketV2 (spot/future/VIX).
  # Requires provider: angelone and a valid live session. Default off — the REST
  # collector still runs; this only adds live ticks on top.
  stream:
    enabled: false
    url: "wss://smartapisocket.angelone.in/smart-stream"

  collector:
    # Ingestion provider: simulated or angelone
    provider: "angelone"

    # Set to true to enforce Indian stock market hours (09:15 - 15:30 IST, Mon-Fri)
    # Default is false to make local testing with SimulatedDataClient work 24/7.
    market-hours-only: true
    
    # Cron expression for data collection scheduler (default: every 1 minute)
    cron: "0 * * * * *"

    # P5-5 freshness gate: skip NEW signal generation if the tick is older than this (seconds)
    # or is a duplicate of the previous snapshot (frozen feed). Protects against trading dead data.
    max-staleness-seconds: 120

    # P5-5d: run the slow decision step (LLM thesis + order) off the collection thread so a slow
    # cycle never drops a minute of snapshot/candle data. Guarded (no overlap/pile-up).
    async-decisions: true

  # P5-3 intraday event trigger: fire a full evaluation between 1-min cycles on a VWAP cross or a
  # break of the previous 15m candle's high/low. Shares the collector's guard (no overlap); cooldown
  # prevents signal spam. The 1-min scheduler stays as the backstop.
  trigger:
    enabled: true
    check-interval-ms: 5000
    cooldown-seconds: 30

  # Telegram Notification Configuration
  telegram:
    enabled: true
    bot-token: ${TELEGRAM_BOT_TOKEN}
    chat-id: ${TELEGRAM_CHAT_ID}

  # AI Decision & Explanation Service Configuration
  ai:
    gemini-api-key: ${GEMINI_API_KEY}

  # Angel One SmartAPI Client Configuration
  angelone:
    api-key: ${ANGEL_ONE_API_KEY}
    client-code: ${ANGEL_ONE_CLIENT_CODE}
    password: ${ANGEL_ONE_PASSWORD}
    totp-key: ${ANGEL_ONE_TOTP_KEY}
