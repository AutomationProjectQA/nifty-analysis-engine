spring:
  application:
    name: nifty-analysis-engine
  
  # Scheduling Task Pool Configuration
  task:
    scheduling:
      pool:
        size: 5
      thread-name-prefix: scheduling-
  
  # Database Configuration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nifty}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      keepalive-time: 60000
  
  # JPA / Hibernate Configuration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Flyway Migration Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    ignore-migration-patterns:
      - "*:future"
      - "*:missing"

  # Redis Cache Configuration
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      timeout: 2000

# Logging Levels
logging:
  level:
    root: INFO
    com.nifty.analysis: INFO
    org.springframework.cache: DEBUG

# Nifty Analysis Engine Properties
nifty:
  gating-threshold: 60.0
  order-execution:
    enabled: true
    lot-size: 65
    risk-per-trade-percent: 100.0

  collector:
    # Ingestion provider: simulated or angelone
    provider: "angelone"

    # Set to true to enforce Indian stock market hours (09:15 - 15:30 IST, Mon-Fri)
    # Default is false to make local testing with SimulatedDataClient work 24/7.
    market-hours-only: false
    
    # Cron expression for data collection scheduler (default: every 1 minute)
    cron: "0 * * * * *"
    
